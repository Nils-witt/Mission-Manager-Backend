<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
    <title th:text="${isNew} ? 'Create Qualification - Mission Manager' : 'Edit Qualification - Mission Manager'"></title>
</head>
<body>
<div th:replace="~{fragments/header :: header(${username})}"></div>
<main class="container" style="max-width: 640px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0" th:text="${isNew} ? 'Create Qualification' : 'Edit Qualification'"></h1>
        <a th:if="${!isNew}" th:href="@{/audit-logs(entityName='Qualification', entityId=${qualificationId})}"
           class="btn btn-outline-secondary btn-sm">View changes</a>
    </div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="${isNew} ? @{/qualifications} : @{/qualifications/{id}(id=${qualificationId})}"
          th:object="${form}" method="post">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" th:field="*{name}" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Type</label>
            <select class="form-select" th:field="*{typeId}" required>
                <option value="" disabled>Select a type…</option>
                <option th:each="t : ${types}" th:value="${t.id}" th:text="${t.name}"></option>
            </select>
            <div class="form-text" th:if="${#lists.isEmpty(types)}">
                No qualification types exist yet. A type must be created before a qualification can be saved.
            </div>
        </div>

        <fieldset class="mb-3">
            <legend class="h6">Included Qualifications</legend>
            <p th:if="${#lists.isEmpty(availableQualifications)}" class="text-muted">No other qualifications exist
                yet.</p>
            <div class="form-check" th:each="q : ${availableQualifications}">
                <input type="checkbox" class="form-check-input" th:field="*{includedQualificationIds}"
                       th:value="${q.id}"/>
                <label class="form-check-label" th:text="${q.name} + ' (' + ${q.type.name} + ')'"></label>
            </div>
        </fieldset>

        <button type="submit" class="btn btn-primary" th:text="${isNew} ? 'Create' : 'Save'"></button>
        <a th:href="@{/qualifications}" class="btn btn-link">Cancel</a>
    </form>
</main>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
