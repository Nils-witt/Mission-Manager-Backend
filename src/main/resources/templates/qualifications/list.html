<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
    <title>Qualifications - Mission Manager</title>
</head>
<body>
<div th:replace="~{fragments/header :: header(${username})}"></div>
<main class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Qualifications</h1>
        <div>
            <a th:href="@{/audit-logs(entityName='Qualification')}" class="btn btn-outline-secondary">History</a>
            <a th:if="${canCreate}" th:href="@{/qualifications/new}" class="btn btn-primary">Create qualification</a>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead>
            <tr>
                <th>Name</th>
                <th>Type</th>
                <th>Includes</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="q : ${qualifications}">
                <td th:text="${q.name}"></td>
                <td><span class="badge text-bg-secondary" th:text="${q.type.name}"></span></td>
                <td>
                    <span th:if="${#sets.isEmpty(q.includedQualifications)}" class="text-muted">-</span>
                    <span th:unless="${#sets.isEmpty(q.includedQualifications)}"
                          th:text="${#sets.size(q.includedQualifications)} + ' qualifications'"
                          class="badge text-bg-info"></span>
                </td>
                <td class="text-end">
                    <a th:href="@{/qualifications/{id}/edit(id=${q.id})}"
                       class="btn btn-sm btn-outline-secondary">Edit</a>
                    <form th:action="@{/qualifications/{id}/delete(id=${q.id})}" method="post" class="d-inline"
                          onsubmit="return confirm('Delete this qualification?');">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
