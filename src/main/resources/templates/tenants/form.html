<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
    <title th:text="${isNew} ? 'Create Tenant - Mission Manager' : 'Edit Tenant - Mission Manager'"></title>
</head>
<body>
<div th:replace="~{fragments/header :: header(${username})}"></div>
<main class="container" style="max-width: 820px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0" th:text="${isNew} ? 'Create Tenant' : 'Edit Tenant'"></h1>
        <a th:if="${!isNew}" th:href="@{/audit-logs(entityName='Tenant', entityId=${tenantId})}"
           class="btn btn-outline-secondary btn-sm">View changes</a>
    </div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="${isNew} ? @{/tenants} : @{/tenants/{id}(id=${tenantId})}" th:object="${form}" method="post">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" th:field="*{name}" required/>
        </div>

        <button type="submit" class="btn btn-primary" th:text="${isNew} ? 'Create' : 'Save'"></button>
        <a th:href="@{/tenants}" class="btn btn-link">Cancel</a>
    </form>
</main>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
