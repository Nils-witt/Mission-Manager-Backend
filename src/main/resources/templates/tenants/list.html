<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
    <title>Tenants - Mission Manager</title>
</head>
<body>
<div th:replace="~{fragments/header :: header(${username})}"></div>
<main class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Tenants</h1>
        <div>
            <a th:href="@{/audit-logs(entityName='Tenant')}" class="btn btn-outline-secondary">History</a>
            <a th:if="${canCreate}" th:href="@{/tenants/new}" class="btn btn-primary">Create tenant</a>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead>
            <tr>
                <th>Name</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="t : ${tenants}">
                <td th:text="${t.name}"></td>
                <td class="text-end">
                    <a th:href="@{/emails(recipientType='TENANT', recipientId=${t.id})}"
                       class="btn btn-sm btn-outline-primary">Email</a>
                    <a th:href="@{/tenants/{id}/edit(id=${t.id})}" class="btn btn-sm btn-outline-secondary">Edit</a>
                    <form th:action="@{/tenants/{id}/delete(id=${t.id})}" method="post" class="d-inline"
                          onsubmit="return confirm('Delete this tenant?');">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
