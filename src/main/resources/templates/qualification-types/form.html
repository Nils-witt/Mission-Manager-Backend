<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
    <title
        th:text="${isNew} ? 'Create Qualification Type - Mission Manager' : 'Edit Qualification Type - Mission Manager'"></title>
</head>
<body>
<div th:replace="~{fragments/header :: header(${username})}"></div>
<main class="container" style="max-width: 640px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0" th:text="${isNew} ? 'Create Qualification Type' : 'Edit Qualification Type'"></h1>
        <a th:if="${!isNew}" th:href="@{/audit-logs(entityName='QualificationType', entityId=${typeId})}"
           class="btn btn-outline-secondary btn-sm">View changes</a>
    </div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="${isNew} ? @{/qualification-types} : @{/qualification-types/{id}(id=${typeId})}"
          th:object="${form}" method="post">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" th:field="*{name}" required/>
        </div>

        <button type="submit" class="btn btn-primary" th:text="${isNew} ? 'Create' : 'Save'"></button>
        <a th:href="@{/qualification-types}" class="btn btn-link">Cancel</a>
    </form>
</main>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
