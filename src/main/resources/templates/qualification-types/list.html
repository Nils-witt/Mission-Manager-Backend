<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
    <title>Qualification Types - Mission Manager</title>
</head>
<body>
<div th:replace="~{fragments/header :: header(${username})}"></div>
<main class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Qualification Types</h1>
        <div>
            <a th:href="@{/audit-logs(entityName='QualificationType')}" class="btn btn-outline-secondary">History</a>
            <a th:if="${canCreate}" th:href="@{/qualification-types/new}" class="btn btn-primary">Create type</a>
        </div>
    </div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead>
            <tr>
                <th>Name</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="t : ${types}">
                <td th:text="${t.name}"></td>
                <td class="text-end">
                    <a th:href="@{/qualification-types/{id}/edit(id=${t.id})}"
                       class="btn btn-sm btn-outline-secondary">Edit</a>
                    <form th:action="@{/qualification-types/{id}/delete(id=${t.id})}" method="post" class="d-inline"
                          onsubmit="return confirm('Delete this qualification type?');">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
