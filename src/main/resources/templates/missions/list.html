<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
    <title>Missions - Mission Manager</title>
</head>
<body>
<div th:replace="~{fragments/header :: header(${username})}"></div>
<main class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Missions</h1>
        <div>
            <a th:href="@{/audit-logs(entityName='Mission')}" class="btn btn-outline-secondary">History</a>
            <a th:if="${canCreate}" th:href="@{/missions/new}" class="btn btn-primary">Create mission</a>
        </div>
    </div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead>
            <tr>
                <th>Name</th>
                <th>Tenant</th>
                <th>Start Time</th>
                <th>End Time</th>
                <th>Street Address</th>
                <th>Available Users</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="m : ${missions}">
                <td th:text="${m.name}"></td>
                <td th:text="${m.tenant.name}"></td>
                <td th:text="${m.startTime != null} ? ${#temporals.format(m.startTime, 'yyyy-MM-dd HH:mm')} : '-'"></td>
                <td th:text="${m.endTime != null} ? ${#temporals.format(m.endTime, 'yyyy-MM-dd HH:mm')} : '-'"></td>
                <td th:text="${m.streetAddress} ?: '-'"></td>
                <td><span class="badge text-bg-info" th:text="${#sets.size(m.availableUsers)} + ' users'"></span></td>
                <td class="text-end">
                    <a th:href="@{/missions/{id}/edit(id=${m.id})}" class="btn btn-sm btn-outline-secondary">Edit</a>
                    <form th:action="@{/missions/{id}/delete(id=${m.id})}" method="post" class="d-inline"
                          onsubmit="return confirm('Delete this mission?');">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
