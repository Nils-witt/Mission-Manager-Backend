<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
    <title th:text="${isNew} ? 'Create Mission - Mission Manager' : 'Edit Mission - Mission Manager'"></title>
</head>
<body>
<div th:replace="~{fragments/header :: header(${username})}"></div>
<main class="container" style="max-width: 720px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0" th:text="${isNew} ? 'Create Mission' : 'Edit Mission'"></h1>
        <a th:if="${!isNew}" th:href="@{/audit-logs(entityName='Mission', entityId=${missionId})}"
           class="btn btn-outline-secondary btn-sm">View changes</a>
    </div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="${isNew} ? @{/missions} : @{/missions/{id}(id=${missionId})}" th:object="${form}" method="post">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" th:field="*{name}" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Tenant</label>
            <select class="form-select" th:field="*{tenantId}" required>
                <option value="" disabled>Select a tenant…</option>
                <option th:each="tenant : ${tenants}" th:value="${tenant.id}" th:text="${tenant.name}"></option>
            </select>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Start Time</label>
                <input type="datetime-local" class="form-control" th:field="*{startTime}"/>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">End Time</label>
                <input type="datetime-local" class="form-control" th:field="*{endTime}"/>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Street Address</label>
            <input type="text" class="form-control" th:field="*{streetAddress}"/>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Latitude</label>
                <input type="number" step="any" min="-90" max="90" class="form-control" th:field="*{latitude}"/>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Longitude</label>
                <input type="number" step="any" min="-180" max="180" class="form-control" th:field="*{longitude}"/>
            </div>
        </div>

        <fieldset class="mb-3">
            <legend class="h6">Available Users</legend>
            <div class="form-check" th:each="user : ${users}">
                <input type="checkbox" class="form-check-input" th:field="*{availableUserIds}"
                       th:value="${user.id}"/>
                <label class="form-check-label" th:text="${user.username}"></label>
            </div>
        </fieldset>

        <button type="submit" class="btn btn-primary" th:text="${isNew} ? 'Create' : 'Save'"></button>
        <a th:href="@{/missions}" class="btn btn-link">Cancel</a>
    </form>
</main>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
