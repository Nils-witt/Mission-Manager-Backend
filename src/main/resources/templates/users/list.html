<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
    <title>Users - Mission Manager</title>
</head>
<body>
<div th:replace="~{fragments/header :: header(${username})}"></div>
<main class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Users</h1>
        <div>
            <a th:href="@{/audit-logs(entityName='User')}" class="btn btn-outline-secondary">History</a>
            <a th:if="${canCreate}" th:href="@{/users/new}" class="btn btn-primary">Create user</a>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead>
            <tr>
                <th>Username</th>
                <th>Name</th>
                <th>Email</th>
                <th>Primary Tenant</th>
                <th>Enabled</th>
                <th>Locked</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${users}">
                <td th:text="${u.username}"></td>
                <td th:text="${u.firstName + ' ' + u.lastName}"></td>
                <td th:text="${u.email}"></td>
                <td th:text="${u.primaryTenant != null} ? ${u.primaryTenant.name} : '-'"></td>
                <td>
                    <span class="badge" th:classappend="${u.enabled} ? 'text-bg-success' : 'text-bg-secondary'"
                          th:text="${u.enabled} ? 'Yes' : 'No'"></span>
                </td>
                <td>
                    <span class="badge" th:classappend="${u.locked} ? 'text-bg-danger' : 'text-bg-secondary'"
                          th:text="${u.locked} ? 'Yes' : 'No'"></span>
                </td>
                <td class="text-end">
                    <a th:href="@{/emails(recipientType='USER', recipientId=${u.id})}"
                       class="btn btn-sm btn-outline-primary">Email</a>
                    <a th:href="@{/users/{id}/edit(id=${u.id})}" class="btn btn-sm btn-outline-secondary">Edit</a>
                    <form th:action="@{/users/{id}/delete(id=${u.id})}" method="post" class="d-inline"
                          onsubmit="return confirm('Delete this user?');">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
