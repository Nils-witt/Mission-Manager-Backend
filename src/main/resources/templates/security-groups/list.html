<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
    <title>Security Groups - Mission Manager</title>
</head>
<body>
<div th:replace="~{fragments/header :: header(${username})}"></div>
<main class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Security Groups</h1>
        <div>
            <a th:href="@{/audit-logs(entityName='SecurityGroup')}" class="btn btn-outline-secondary">History</a>
            <a th:if="${canCreate}" th:href="@{/security-groups/new}" class="btn btn-primary">Create security
                group</a>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead>
            <tr>
                <th>Name</th>
                <th>SSO Group Name</th>
                <th>Roles</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="g : ${groups}">
                <td>
                    <span th:text="${g.name}"></span>
                    <span th:if="${g.builtIn}" class="badge text-bg-secondary ms-1">built-in</span>
                </td>
                <td th:text="${g.ssoGroupName}"></td>
                <td><span class="badge text-bg-info" th:text="${#sets.size(g.roles)} + ' roles'"></span></td>
                <td class="text-end">
                    <a th:href="@{/emails(recipientType='GROUP', recipientId=${g.id})}"
                       class="btn btn-sm btn-outline-primary">Email</a>
                    <a th:href="@{/security-groups/{id}/edit(id=${g.id})}" class="btn btn-sm btn-outline-secondary"
                       th:text="${g.builtIn} ? 'View' : 'Edit'"></a>
                    <form th:if="${!g.builtIn}"
                          th:action="@{/security-groups/{id}/delete(id=${g.id})}" method="post" class="d-inline"
                          onsubmit="return confirm('Delete this security group?');">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
