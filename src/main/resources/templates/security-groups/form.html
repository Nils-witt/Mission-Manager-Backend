<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
    <title
        th:text="${isBuiltIn} ? 'View Security Group - Mission Manager' : (${isNew} ? 'Create Security Group - Mission Manager' : 'Edit Security Group - Mission Manager')"></title>
</head>
<body>
<div th:replace="~{fragments/header :: header(${username})}"></div>
<main class="container" style="max-width: 820px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0"
            th:text="${isBuiltIn} ? 'View Security Group' : (${isNew} ? 'Create Security Group' : 'Edit Security Group')"></h1>
        <a th:if="${!isNew}" th:href="@{/audit-logs(entityName='SecurityGroup', entityId=${groupId})}"
           class="btn btn-outline-secondary btn-sm">View changes</a>
    </div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${isBuiltIn}" class="alert alert-warning">
        This is a built-in security group required by the application. It cannot be edited or deleted.
    </div>

    <form th:action="${isNew} ? @{/security-groups} : @{/security-groups/{id}(id=${groupId})}" th:object="${form}"
          method="post">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" th:field="*{name}" th:disabled="${isBuiltIn}" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">SSO Group Name</label>
            <input type="text" class="form-control" th:field="*{ssoGroupName}" th:disabled="${isBuiltIn}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Tenant</label>
            <select class="form-select" th:field="*{tenantId}" th:disabled="${isBuiltIn}" required>
                <option value="" disabled>Select a tenant…</option>
                <option th:each="tenant : ${tenants}" th:value="${tenant.id}" th:text="${tenant.name}"></option>
            </select>
        </div>

        <fieldset class="mb-3">
            <legend class="h6">Roles</legend>
            <div class="table-responsive">
                <table class="table table-sm table-bordered text-center align-middle">
                    <thead>
                    <tr>
                        <th class="text-start">Type</th>
                        <th th:each="scope : ${scopes}" th:text="${scope}"></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="type : ${types}">
                        <td class="text-start" th:text="${type}"></td>
                        <td th:each="scope : ${scopes}">
                            <input type="checkbox" class="form-check-input" th:field="*{roles}"
                                   th:value="${type + '_' + scope}" th:disabled="${isBuiltIn}"/>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </fieldset>

        <button th:unless="${isBuiltIn}" type="submit" class="btn btn-primary"
                th:text="${isNew} ? 'Create' : 'Save'"></button>
        <a th:href="@{/security-groups}" class="btn btn-link">Cancel</a>
    </form>
</main>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
